version: "3.9"

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./gateway/config.json:/etc/sovereign-vpn/config.json:ro
    command:
      - "--config=/etc/sovereign-vpn/config.json"
      - "--wg-interface=wg0"
      - "--wg-endpoint=${VPN_ENDPOINT:-vpn.example.com:51820}"
      - "--wg-pubkey=${WG_SERVER_PUBKEY}"
      - "--eth-ws=${ETH_WS_URL:-}"
      - "--delegation"
      - "--subscription-manager=${SUBSCRIPTION_MANAGER:-}"
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "1"
    restart: unless-stopped
    networks:
      - vpn

  payout-service:
    build:
      context: ./payout-service
      dockerfile: Dockerfile
    environment:
      - ETH_RPC_URL=${ETH_RPC_URL:-}
      - CHAIN_ID=${CHAIN_ID:-1}
      - PAYOUT_VAULT_ADDRESS=${PAYOUT_VAULT_ADDRESS:-}
      - NODE_REGISTRY_ADDRESS=${NODE_REGISTRY_ADDRESS:-}
      - EXECUTOR_PRIVATE_KEY=${EXECUTOR_PRIVATE_KEY:-}
      - RAILGUN_MNEMONIC=${RAILGUN_MNEMONIC:-}
      - PAYOUT_CRON=${PAYOUT_CRON:-0 0 * * 0}
      - MIN_PAYOUT_WEI=${MIN_PAYOUT_WEI:-10000000000000000}
      - DRY_RUN=${DRY_RUN:-true}
      - HEALTH_PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - payout-data:/app/data
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "1"
    restart: unless-stopped
    networks:
      - vpn

volumes:
  payout-data:

networks:
  vpn:
    driver: bridge
